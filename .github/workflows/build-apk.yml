name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download AutoX APK
        run: |
          # 从 gitee 镜像下载 AutoX APK
          curl -L -o autox.apk "https://gitee.com/mirrors/AutoX/releases/download/v6.5.5/app-v6.5.5-release-unsigned.apk" || \
          curl -L -o autox.apk "https://github.com/AutoX-Android/AutoX/releases/download/v6.5.5/app-v6.5.5-release-unsigned.apk" || \
          echo "Download failed, trying alternative..."

      - name: Prepare APK
        run: |
          # 安装 apktool
          sudo apt-get install -y apktool
          
          # 解包 APK
          apktool d autox.apk -o autox_unpacked
          
          # 注入脚本
          mkdir -p autox_unpacked/assets/project
          cp main.js autox_unpacked/assets/project/main.js
          echo '{"name":"抖音自动化","versionName":"1.0.0","versionCode":1,"packageName":"com.douyin.auto"}' > autox_unpacked/assets/project/config.json
          
          # 重新打包
          apktool b autox_unpacked -o douyin-auto.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: douyin-auto-apk
          path: douyin-auto.apk
