name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download AutoX APK
        run: |
          # 从 Gitee 镜像下载
          curl -L -o autox.apk "https://gitee.com/petterobam/AutoX-docker/releases/download/v6.5.5/app-v6.5.5-release-unsigned.apk" || \
          curl -L -o autox.apk "https://hub.nuaa.cf/kkevsekk1/AutoX/releases/download/v6.5.5/app-v6.5.5-release-unsigned.apk" || \
          curl -L -o autox.apk "https://github.com/nicepkg/AutoX/releases/download/v6.5.5/app-v6.5.5-release-unsigned.apk" || \
          echo "All downloads failed"

          ls -lh autox.apk || exit 1

      - name: Inject Script
        run: |
          # 解压 APK
          unzip autox.apk -d unpacked

          # 创建项目目录
          mkdir -p unpacked/assets/project

          # 复制脚本
          cp main.js unpacked/assets/project/main.js

          # 创建配置
          cat > unpacked/assets/project/config.json << 'EOF'
          {"name":"抖音自动化","versionName":"1.0.0","versionCode":1,"packageName":"com.douyin.auto"}
          EOF

          # 重新打包
          cd unpacked
          zip -r ../douyin-auto-unsigned.apk .
          cd ..

      - name: Sign APK
        run: |
          # 生成签名密钥
          keytool -genkey -v -keystore my-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias my-key -storepass 123456 -keypass 123456 -dname "CN=Test"

          # 对齐
          zipalign -v 4 douyin-auto-unsigned.apk douyin-auto-aligned.apk || cp douyin-auto-unsigned.apk douyin-auto-aligned.apk

          # 签名
          apksigner sign --ks my-key.jks --ks-pass pass:123456 --key-pass pass:123456 --out douyin-auto.apk douyin-auto-aligned.apk || \
          jarsigner -verbose -keystore my-key.jks -storepass 123456 -keypass 123456 douyin-auto-aligned.apk my-key && mv douyin-auto-aligned.apk douyin-auto.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: douyin-auto-apk
          path: douyin-auto.apk
